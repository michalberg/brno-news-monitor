    <title>Brno News – March 2026</title>
    <link rel="stylesheet" href="../../assets/style.css">
    <style>
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .calendar-month-nav {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .cal-weekday {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            padding: 0.4rem 0;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .cal-day-empty {
            /* spacer for days before start of month */
        }
        .cal-day {
            aspect-ratio: 1;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.15s, transform 0.1s;
        }
        .cal-day.no-data {
            color: var(--text-muted);
            background: var(--surface);
            cursor: default;
        }
        .cal-day.has-data {
            background: var(--primary-light, #e8f0fe);
            color: var(--primary, #1a56db);
            font-weight: 600;
            border: 2px solid var(--primary, #1a56db);
        }
        .cal-day.has-data:hover {
            background: var(--primary, #1a56db);
            color: #fff;
            transform: scale(1.06);
        }
        .cal-day.today {
            box-shadow: 0 0 0 2px var(--accent, #e53e3e);
        }
        .cal-day .cal-day-num {
            font-size: 1.1rem;
            line-height: 1;
        }
        .cal-day .cal-day-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            margin-top: 4px;
            opacity: 0.6;
        }
        .month-section {
            background: var(--card-bg, #fff);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--card-shadow, 0 1px 4px rgba(0,0,0,.07));
            margin-bottom: 2rem;
        }
        .month-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0;
        }
    </style>
</head>
