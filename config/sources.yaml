    url: "https://brnenska.drbna.cz/zpravy.html"
    category: "media"
    article_link_pattern: 'href="(https://brnenska\.drbna\.cz/zpravy/[a-z-]+/\d+-[^"]+\.html)"'
    title_pattern: 'href="https://brnenska\.drbna\.cz/zpravy/[a-z-]+/\d+-[^"]+\.html"[^>]*>([^<]+)</a>'
    fetch_article_text: true
  - name: "Novinky.cz Brno (sekce)"
    url: "https://www.novinky.cz/sekce/domaci-zpravy-jihomoravsky-kraj-406"
    category: "media"
    article_link_pattern: 'href="(https://www\.novinky\.cz/clanek/[a-z0-9-]+-\d+)"'
    title_pattern: 'href="https://www\.novinky\.cz/clanek/[a-z0-9-]+-\d+"[^>]*>([^<]{10,})</a>'
    fetch_article_text: false
  # Poznámka: seznamzpravy.cz/tag/brno-3112 je JS-rendered, nelze scrapovat bez headless browseru.
