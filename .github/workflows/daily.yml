name: Daily News Fetch

on:
  schedule:
    - cron: '30 5 * * *'  # 05:30 UTC = 06:30 CET
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch RSS feeds
        run: python scripts/fetch_rss.py --run daily

      - name: Analyze articles with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/analyze.py --run daily

      - name: Generate HTML pages
        env:
          ACTION_NETWORK_API: ${{ secrets.ACTION_NETWORK_API }}
        run: python scripts/generate_html.py --run daily

      - name: Send email notification
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python scripts/send_email.py --run daily
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config --global user.name "Brno News Bot"
          git config --global user.email "actions@github.com"
          git add docs/ data/
          git diff --staged --quiet || git commit -m "feat: daily news update $(date +'%Y-%m-%d')"
          git push
